name: Scheduled Retrain

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM hàng ngày
  workflow_dispatch:        # cho phép chạy thủ công

jobs:
  retrain:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sepsis_db
          POSTGRES_USER: sepsis_user
          POSTGRES_PASSWORD: sepsis_pass
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt

      - name: Start MLflow server (background)
        run: |
          mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns &
          sleep 8
          curl -sf http://localhost:5000/health && echo 'MLflow OK' || echo 'MLflow may still be starting'

      - name: Seed CI data
        env:
          DATABASE_URL: postgresql+psycopg2://sepsis_user:sepsis_pass@localhost:5432/sepsis_db
        run: python scripts/ci_seed_data.py

      - name: Generate drift data (current)
        run: python scripts/make_drift_data.py

      - name: Run retrain flow
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          DATABASE_URL: postgresql+psycopg2://sepsis_user:sepsis_pass@localhost:5432/sepsis_db
        run: python -m monitoring.retrain_flow
