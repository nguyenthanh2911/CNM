networks:
  icu-network:
    driver: bridge

services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - icu-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    env_file:
      - .env
    command:
      - sh
      - -c
      - >-
        pip install psycopg2-binary &&
        mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
        --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    networks:
      - icu-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - icu-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/icu_dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - icu-network

  ml_service:
    build:
      context: .
      dockerfile: services/ml_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ALERT_SERVICE_URL=http://alert_service:8002
    depends_on:
      - postgres
      - mlflow
    volumes:
      - .:/app
    networks:
      - icu-network
    restart: unless-stopped

  alert_service:
    build:
      context: .
      dockerfile: services/alert_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    networks:
      - icu-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ML_SERVICE_URL=http://ml_service:8001
      - ALERT_SERVICE_URL=http://alert_service:8002
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - postgres
      - ml_service
      - alert_service
    networks:
      - icu-network
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_data:
  grafana_data:
