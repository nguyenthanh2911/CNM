<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ICU Sepsis Early Warning</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    /* ── Global reset ─────────────────────── */
    *, *::before, *::after { box-sizing: border-box }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f8fb;
      margin: 0;
      color: #1a1a1a;
    }

    /* ── Navbar ───────────────────────────── */
    .icu-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(127,119,221,.25);
    }

    /* Brand */
    .icu-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .icu-brand-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7F77DD, #D4537E);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .icu-brand-text {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: .2px;
    }
    .icu-brand-text span {
      background: linear-gradient(90deg, #a89ff5, #e891b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Nav links */
    .icu-nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .icu-nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.55);
      text-decoration: none;
      transition: background .2s, color .2s;
      position: relative;
    }
    .icu-nav-link:hover {
      background: rgba(255,255,255,.08);
      color: #fff;
    }
    .icu-nav-link.active {
      background: rgba(127,119,221,.2);
      color: #a89ff5;
    }
    .icu-nav-link.active::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, #7F77DD, #D4537E);
    }

    /* Right side */
    .icu-nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .icu-alert-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      background: rgba(212,83,126,.12);
      border: 0.5px solid rgba(212,83,126,.3);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: #e891b8;
      text-decoration: none;
      animation: pulse-nav 2s ease-in-out infinite;
    }
    .icu-alert-pill.no-alert {
      background: rgba(29,158,117,.1);
      border-color: rgba(29,158,117,.25);
      color: #5ecba1;
      animation: none;
    }
    @keyframes pulse-nav {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,83,126,.2) }
      50%       { box-shadow: 0 0 0 5px rgba(212,83,126,0) }
    }
    .icu-alert-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #D4537E;
      animation: blink-nav 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .icu-alert-pill.no-alert .icu-alert-dot {
      background: #1D9E75;
      animation: none;
    }
    @keyframes blink-nav {
      0%, 100% { opacity: 1 }
      50%       { opacity: .1 }
    }
    .icu-nav-clock {
      font-size: 12px;
      color: rgba(255,255,255,.4);
      font-variant-numeric: tabular-nums;
      letter-spacing: .3px;
      min-width: 60px;
      text-align: right;
    }

    /* ── Main container ───────────────────── */
    .icu-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
    }

    /* ── Scrollbar ────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px }
    ::-webkit-scrollbar-track { background: transparent }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #7F77DD, #D4537E);
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="icu-nav">
    <a class="icu-brand" href="/">
      <div class="icu-brand-icon">🏥</div>
      <span class="icu-brand-text">ICU <span>Sepsis</span></span>
    </a>

    <div class="icu-nav-links">
      <a class="icu-nav-link" href="/"
         id="nav-dashboard">Dashboard</a>
      <a class="icu-nav-link" href="/alerts/"
         id="nav-alerts">Alerts</a>
    </div>

    <div class="icu-nav-right">
      <a class="icu-alert-pill" href="/alerts/?status=pending" id="nav-alert-pill">
        <span class="icu-alert-dot"></span>
        <span id="nav-alert-text">Alerts</span>
      </a>
      <div class="icu-nav-clock" id="nav-clock">--:--:--</div>
    </div>
  </nav>

  <!-- CONTENT -->
  <main class="icu-main">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    /* ── Đồng hồ navbar ── */
    function navTick() {
      const el = document.getElementById('nav-clock');
      if (el) el.textContent = new Date().toLocaleTimeString('vi-VN');
    }
    navTick();
    setInterval(navTick, 1000);

    /* ── Active nav link ── */
    const path = window.location.pathname;
    if (path.startsWith('/alerts')) {
      document.getElementById('nav-alerts')?.classList.add('active');
    } else {
      document.getElementById('nav-dashboard')?.classList.add('active');
    }

    /* ── Fetch số alert pending để hiển thị trên navbar ── */
    async function fetchAlertCount() {
      try {
        const resp = await fetch('/api/alert-count/');
        if (!resp.ok) return;
        const d = await resp.json();
        const pill = document.getElementById('nav-alert-pill');
        const txt  = document.getElementById('nav-alert-text');
        if (!pill || !txt) return;
        const count = d.pending || 0;
        if (count === 0) {
          pill.classList.add('no-alert');
          txt.textContent = 'Không có cảnh báo';
        } else {
          pill.classList.remove('no-alert');
          txt.textContent = count + ' cảnh báo';
        }
      } catch(e) {}
    }
    fetchAlertCount();
    setInterval(fetchAlertCount, 15000);
  </script>

</body>
</html>
